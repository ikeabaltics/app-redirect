<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open app (LV)</title>

<script>
(() => {

  const ua = navigator.userAgent || navigator.vendor || window.opera;

  // Final URLs (already containing tracking if needed)
  const IOS_URL = "https://apps.apple.com/app/apple-store/id1622334309?pt=306328&ct=LV-WebQR&mt=8";
  const ANDROID_URL = "https://play.google.com/store/apps/details?id=com.ikea.inter.shoppableapp&referrer=utm_source%3DLV-WebQR";

  // Device detection
  const isAndroid = /android/i.test(ua);
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

  const target = isAndroid ? ANDROID_URL : (isIOS ? IOS_URL : IOS_URL);

  // Reliable redirect
  const go = (url) => {
    try { window.location.replace(url); } catch(e) {}
    setTimeout(() => {
      try { window.location.href = url; } catch(e) {}
    }, 120);
  };

  go(target);

  // Fallback UI
  setTimeout(() => {

    const fallback = document.getElementById("fallback");
    if (fallback) fallback.style.display = "block";

    const btnIos = document.getElementById("btn-ios");
    const btnAndroid = document.getElementById("btn-android");

    if (btnIos) btnIos.href = IOS_URL;
    if (btnAndroid) btnAndroid.href = ANDROID_URL;

  }, 900);

})();
</script>

<style>
#fallback{
  display:none;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  padding:20px;
}

.btn{
  display:block;
  padding:12px 14px;
  margin:10px 0;
  text-decoration:none;
  border:1px solid #ccc;
  border-radius:10px;
}
</style>

</head>

<body>

<div id="fallback">
  <div style="font-size:16px;margin-bottom:10px;">
    If nothing happened, open the store manually:
  </div>

  <a class="btn" id="btn-ios" href="https://apps.apple.com/app/apple-store/id1622334309?pt=306328&ct=LV-WebQR&mt=8">
    Open in App Store
  </a>

  <a class="btn" id="btn-android" href="https://play.google.com/store/apps/details?id=com.ikea.inter.shoppableapp&referrer=utm_source%3DLV-WebQR">
    Open in Google Play
  </a>
</div>

</body>
</html>
